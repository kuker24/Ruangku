<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="B Campus Logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="#ffffff33" stroke-width="1.6"/>

  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#ring)" stroke-width="2.4" stroke-linecap="round"
          stroke-dasharray="34 20 18 20" stroke-dashoffset="-36" opacity="0.88"/>

  <!-- Campus silhouette -->
  <path d="M22 47V42H42V47" fill="none" stroke="#ffffff9e" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="30" y="43.3" width="4" height="3.7" rx="0.8" fill="#ffffff9e"/>

  <!-- Letter B -->
  <text x="32" y="41" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">B</text>

  <!-- Graduation cap (campus theme) -->
  <path d="M20 16L32 11L44 16L32 21Z" fill="#f59e0b"/>
  <rect x="27" y="20" width="10" height="2.8" rx="1.4" fill="#fbbf24"/>
  <path d="M44 16.2V22" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="44" cy="27.1" r="1.45" fill="#fbbf24"/>
</svg>
